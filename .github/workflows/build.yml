name: Build Windows VST3

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCOPY_PLUGIN=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: RiserKnob-Windows-VST3
          path: build/RiserKnob_artefacts/Release/VST3/
